name: Build staging image

on:
  workflow_dispatch:
    inputs:
      web_ref:
        description: "myapp-web branch, tag, or commit to build"
        required: true
        default: "main"
        type: string
      image_tag:
        description: "image tag to publish"
        required: true
        default: "staging-latest"
        type: string
      api_base_url:
        description: "absolute API base URL; leave empty for same-origin proxy"
        required: false
        default: ""
        type: string
      push_latest:
        description: "also push :latest"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/myapp-web

jobs:
  verify-build-push:
    name: Verify, build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Web source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.web_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Generate Umi files
        run: npx max setup

      - name: Verify source
        run: |
          npm run tsc
          npm run biome:lint
          npm test -- --runInBand

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=myapp Web
            org.opencontainers.image.description=MyApp Ant Design Pro Web frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MYAPP_WEB_API_BASE_URL=${{ inputs.api_base_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
