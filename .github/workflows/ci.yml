name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npm run tsc

      - name: Lint
        run: npm run biome:lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          NODE_OPTIONS: --max_old_space_size=4096
          PROGRESS: none
